<!DOCTYPE html>

<html lang="zh-CN">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>历史溯源 - 开平碉楼</title>
<script src="https://modao.cc/agent-py/static/source/js/tailwindcss.3.4.3.js"></script>
<script src="https://modao.cc/agent-py/static/source/js/iconify-icon.min.1.0.7.js"></script>
<style>
        :root { --color-cream: #F5F5DC; --color-brown: #A67C52; --color-grey: #4A4A4A; --color-red: #8B0000; }
        body { background-color: var(--color-cream); color: var(--color-grey); }
        .font-kaiti { font-family: 'Kaiti', 'STKaiti', serif; }
        .timeline-line { width: 2px; height: 100%; background: var(--color-brown); position: absolute; left: 50%; transform: translateX(-50%); }
        .timeline-item { position: relative; margin-bottom: 80px; width: 100%; display: flex; justify-content: space-between; align-items: center; }
        .timeline-item:nth-child(even) { flex-direction: row-reverse; }
        .timeline-content { width: 42%; cursor: pointer; transition: all 0.3s ease; }
        .timeline-content:hover { transform: scale(1.05); }
        .timeline-dot { width: 20px; height: 20px; background: var(--color-red); border-radius: 50%; border: 4px solid white; z-index: 10; position: absolute; left: 50%; transform: translateX(-50%); }
        
        /* 弹窗样式 */
        #modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.8); z-index: 100; align-items: center; justify-content: center; padding: 20px; }
        #modal-content { background: var(--color-cream); max-width: 600px; width: 100%; border-radius: 8px; padding: 40px; position: relative; }
    </style>
</head>
<body>
<nav class="fixed w-full z-50 bg-[#F5F5DC]/90 border-b border-[#A67C52]/20 py-4">
<div class="max-w-7xl mx-auto px-6 flex justify-between items-center">
<a class="flex items-center space-x-2" href="index.html">
<iconify-icon class="text-3xl text-[#8B0000]" icon="ri:ancient-gate-fill"></iconify-icon>
<span class="text-2xl font-kaiti font-bold">开平碉楼</span>
</a>
<div class="hidden md:flex space-x-8">
<a href="index.html">首页</a>
<a href="overview.html">概况</a>
<a class="text-[#8B0000]" href="history.html">历史</a>
<a href="architecture.html">建筑</a>
<a href="buildings.html">名楼</a>
<a href="culture.html">价值</a>
</div>
</div>
</nav>
<section class="pt-32 pb-24 px-6 max-w-5xl mx-auto text-center">
<h1 class="text-5xl font-kaiti mb-8">历史溯源</h1>
<p class="text-gray-600 mb-16 text-lg">每一块青砖，都承载着百年的风云变幻。点击时间节点，了解背后的故事。</p>
<div class="relative py-10">
<div class="timeline-line"></div>
<!-- 16世纪 -->
<div class="timeline-item">
<div class="timeline-dot"></div>
<div class="timeline-content bg-white p-6 rounded shadow-lg text-left" onclick="showDetail('16世纪', '碉楼萌芽：明朝嘉靖年间，开平匪患严重。为求自保，当地村民开始兴建简单的防御性建筑，即早期的众楼。')">
<span class="text-[#8B0000] font-bold">16世纪 明朝后期</span>
<h4 class="text-xl font-kaiti mt-2">匪患下的自保萌芽</h4>
<p class="text-sm text-gray-500 mt-2">赤坎镇开始出现最初的防御性更楼。</p>
</div>
<div class="w-[42%]"></div>
</div>
<!-- 19世纪中叶 -->
<div class="timeline-item">
<div class="timeline-dot"></div>
<div class="timeline-content bg-white p-6 rounded shadow-lg text-left" onclick="showDetail('19世纪中叶', '华侨史开启：鸦片战争后，大批开平青年远渡重洋。他们在美国、加拿大等地从事淘金、修筑铁路等苦役，积累了血汗钱回乡建设。')">
<span class="text-[#8B0000] font-bold">19世纪中叶</span>
<h4 class="text-xl font-kaiti mt-2">华侨淘金与归乡潮</h4>
<p class="text-sm text-gray-500 mt-2">不仅带回了金钱，更带回了异国的建筑设计蓝图。</p>
</div>
<div class="w-[42%]"></div>
</div>
<!-- 1920s -->
<div class="timeline-item">
<div class="timeline-dot"></div>
<div class="timeline-content bg-white p-6 rounded shadow-lg text-left" onclick="showDetail('1920s - 1930s', '鼎盛时期：随着海外侨款源源不断汇回，开平迎来了碉楼建设的高峰。这一时期建设的碉楼融合了极高的艺术性与防御力。')">
<span class="text-[#8B0000] font-bold">1920s - 1930s</span>
<h4 class="text-xl font-kaiti mt-2">建设的黄金巅峰</h4>
<p class="text-sm text-gray-500 mt-2">每年兴建数量多达数百座，形成了今日“无村不碉”的景象。</p>
</div>
<div class="w-[42%]"></div>
</div>
<!-- 2007年 -->
<div class="timeline-item">
<div class="timeline-dot"></div>
<div class="timeline-content bg-white p-6 rounded shadow-lg text-left" onclick="showDetail('2007年', '入选世遗：在新西兰召开的世界遗产大会上，“开平碉楼与村落”被正式列入《世界遗产名录》，成为中国第35处世界遗产。')">
<span class="text-[#8B0000] font-bold">2007年 6月27日</span>
<h4 class="text-xl font-kaiti mt-2">荣登世界文化遗产</h4>
<p class="text-sm text-gray-500 mt-2">国际社会对这一华侨文化载体的高度认可。</p>
</div>
<div class="w-[42%]"></div>
</div>
</div>
</section>
<!-- 弹窗 -->
<div id="modal" onclick="closeModal()">
<div id="modal-content" onclick="event.stopPropagation()">
<button class="absolute top-4 right-4 text-2xl" onclick="closeModal()">×</button>
<h2 class="text-3xl font-kaiti text-[#8B0000] mb-6" id="modal-title"></h2>
<div class="w-full h-48 bg-gray-200 rounded mb-6 flex items-center justify-center">
<img alt="History Detail" class="object-cover h-full w-full rounded" src="https://modao.cc/agent-py/media/generated_images/2026-04-21/6b7c3b946aec402db77de6162c4a7d04.jpg"/>
</div>
<p class="text-gray-700 leading-relaxed text-lg" id="modal-desc"></p>
</div>
</div>
<script>
        function showDetail(title, desc) {
            document.getElementById('modal-title').innerText = title;
            document.getElementById('modal-desc').innerText = desc;
            document.getElementById('modal').style.display = 'flex';
        }
        function closeModal() {
            document.getElementById('modal').style.display = 'none';
        }
    </script>
</body>
</html>
